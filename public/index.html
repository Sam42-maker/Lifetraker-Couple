<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lifetracker - Us Space</title>
    
    <link rel="stylesheet" href="../src/css/style.css">
    <link rel="stylesheet" href="../src/css/splash.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <div id="splash-screen">
        <img id="cat_shandy" src="assets/splash/cat_shandy.png" alt="Shandy Cat">
        <img id="cat_rafdah" src="assets/splash/cat_rafdah.png" alt="Rafdah Cat">
        <img id="cat_yinyang" src="assets/splash/cat_yinyang.png" alt="Yin Yang Cat">
        
        <div id="love-particles">
            <span class="heart h1">❤️</span>
            <span class="heart h2">💕</span>
            <span class="heart h3">✨</span>
        </div>
    </div>

    <div id="main-dashboard" class="hidden">
        <div class="dashboard-header">
            <h2>Hai Shandy & Rafdah 👋</h2>
            <p>Welcome back to your space.</p>
        </div>
        
        <div class="card-pastel">
            <h3>Total Pengeluaran</h3>
            <h1 class="money-text">Rp 0</h1>
            
            <div style="position: relative; height: 300px; width: 100%; margin-top: 20px;">
                <canvas id="expensePieChart"></canvas>
            </div>
        </div>
    </div>

        <script src="../src/js/auth.js"></script>   <script src="../src/js/api.js"></script>    <script src="../src/js/charts.js"></script> <script src="../src/js/app.js"></script>    </body>
</html></body>
</html>
